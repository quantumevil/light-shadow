<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留住光，纪录影，显影世界！</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 浮动导航栏 -->
    <nav id="navbar">
        <div class="nav-inner">
            <a href="#home" class="nav-logo">光影之间</a>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#gallery">图片</a></li>
                <li><a href="#music">音乐</a></li>
                <li><a href="#video">视频</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 Hero -->
    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">留住光，纪录影，显影世界！</h1>
            <p class="hero-subtitle">用镜头捕捉时光的痕迹</p>
        </div>
    </section>

    <!-- 图片作品集 -->
    <section id="gallery" class="section">
        <div class="section-header">
            <h2>图片作品集</h2>
            <p class="section-desc">光影交错，定格瞬间</p>
        </div>

        <!-- 人文 -->
        <div class="category">
            <h3 class="category-title">人文</h3>
            <div class="gallery-grid" id="gallery-humanities">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 风光 -->
        <div class="category">
            <h3 class="category-title">风光</h3>
            <div class="gallery-grid" id="gallery-landscape">
                <!-- JS 动态生成 -->
            </div>
        </div>
    </section>

    <!-- 音乐 -->
    <section id="music" class="section section-dark">
        <div class="section-header">
            <h2>音乐</h2>
            <p class="section-desc">旋律与光影共鸣</p>
        </div>
        <div class="music-player">
            <div class="music-info">
                <div class="music-cover">
                    <span>&#9835;</span>
                </div>
                <div class="music-details">
                    <h4 class="music-title">Won't Let You Go</h4>
                    <p class="music-artist">Various Artists</p>
                </div>
            </div>
            <audio id="audio-player" controls>
                <source src="音乐/Various Artists - Won't Let You Go.mp3" type="audio/mpeg">
                您的浏览器不支持音频播放。
            </audio>
        </div>
    </section>

    <!-- 视频 -->
    <section id="video" class="section">
        <div class="section-header">
            <h2>视频</h2>
            <p class="section-desc">流动的画面，永恒的故事</p>
        </div>
        <div class="video-wrapper">
            <video id="video-player" controls>
                <source src="视频/东区.mp4" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
            <div class="video-info">
                <h4 class="video-title">东区</h4>
                <p class="video-desc">镜头下的中国农业大学东校区，光影与建筑的交响</p>
            </div>
        </div>
    </section>

    <!-- 联系 -->
    <section id="contact" class="section section-dark">
        <div class="section-header">
            <h2>联系方式</h2>
            <p class="section-desc">期待与你的交流</p>
        </div>
        <div class="contact-content">
            <a href="mailto:1690351574@qq.com" class="contact-email">
                <span class="email-icon">&#9993;</span>
                1690351574@qq.com
            </a>
            <p class="contact-note">如有合作或交流意向，欢迎邮件联系</p>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2026 光影之间. All rights reserved.</p>
    </footer>

    <!-- 灯箱 -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
